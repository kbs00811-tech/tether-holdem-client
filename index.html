
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
      <meta name="theme-color" content="#0B0E14" />
      <meta name="mobile-web-app-capable" content="yes" />
      <title>TETHER.BET Poker</title>
      <link rel="manifest" href="/manifest.json" />
      <style>
        html, body { height: 100%; margin: 0; overflow: hidden; touch-action: manipulation; }
        #root { height: 100%; }
      </style>
    </head>

    <body>
      <div id="root">
        <!-- React mounts here. Extra wrapper prevents extension DOM conflicts. -->
        <div id="app-inner"></div>
      </div>
      <script>
        // Guard against browser extensions injecting/removing DOM nodes
        // that conflict with React's virtual DOM reconciliation
        const origRemoveChild = Node.prototype.removeChild;
        Node.prototype.removeChild = function(child) {
          if (child.parentNode !== this) {
            console.warn('[DOM Guard] removeChild: node is not a child, skipping');
            return child;
          }
          return origRemoveChild.call(this, child);
        };
        const origInsertBefore = Node.prototype.insertBefore;
        Node.prototype.insertBefore = function(newNode, refNode) {
          if (refNode && refNode.parentNode !== this) {
            console.warn('[DOM Guard] insertBefore: ref is not a child, appending');
            return origInsertBefore.call(this, newNode, null);
          }
          return origInsertBefore.call(this, newNode, refNode);
        };
      </script>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
